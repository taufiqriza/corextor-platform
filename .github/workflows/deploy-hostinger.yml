name: Deploy Hostinger Production

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy manually
        required: true
        default: production
      switch_live:
        description: Repoint docroots to the new release
        required: true
        type: boolean
        default: false
      run_migrations:
        description: Run Laravel migrations during deploy
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: corextor-production
  cancel-in-progress: false

jobs:
  build-web:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_MAIN_APP_ORIGIN: ${{ vars.VITE_MAIN_APP_ORIGIN }}
      VITE_EMPLOYEE_APP_ORIGIN: ${{ vars.VITE_EMPLOYEE_APP_ORIGIN }}
    steps:
      - name: Resolve deploy ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DEPLOY_REF=${{ inputs.ref }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_REF=${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Validate build output
        run: |
          if [ ! -f web/dist/index.html ]; then
            echo "Build failed: web/dist/index.html not found" >&2
            exit 1
          fi
          echo "Build output validated"
          ls -la web/dist/

      - name: Pack frontend artifact
        run: tar -czf "$RUNNER_TEMP/web-dist.tar.gz" -C web/dist .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: ${{ runner.temp }}/web-dist.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build-web
    env:
      HOSTINGER_DEPLOY_BASE: ${{ vars.HOSTINGER_DEPLOY_BASE }}
      HOSTINGER_PRIMARY_DOCROOT: ${{ vars.HOSTINGER_PRIMARY_DOCROOT }}
      HOSTINGER_EMPLOYEE_SUBDIR_NAME: ${{ vars.HOSTINGER_EMPLOYEE_SUBDIR_NAME }}
      HOSTINGER_API_SUBDIR_NAME: ${{ vars.HOSTINGER_API_SUBDIR_NAME }}
    steps:
      - name: Resolve deploy settings
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DEPLOY_REF=${{ inputs.ref }}" >> "$GITHUB_ENV"
            echo "SWITCH_LIVE=${{ inputs.switch_live && '1' || '0' }}" >> "$GITHUB_ENV"
            echo "RUN_MIGRATIONS=${{ inputs.run_migrations && '1' || '0' }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_REF=${{ github.sha }}" >> "$GITHUB_ENV"
            echo "SWITCH_LIVE=1" >> "$GITHUB_ENV"
            echo "RUN_MIGRATIONS=1" >> "$GITHUB_ENV"
          fi

          SSH_HOST_VALUE="${{ vars.HOSTINGER_SSH_HOST }}"
          if [ -z "$SSH_HOST_VALUE" ]; then
            SSH_HOST_VALUE="${{ vars.SSH_HOST }}"
          fi
          if [ -z "$SSH_HOST_VALUE" ]; then
            SSH_HOST_VALUE="${{ secrets.HOSTINGER_SSH_HOST }}"
          fi
          if [ -z "$SSH_HOST_VALUE" ]; then
            SSH_HOST_VALUE="${{ secrets.SSH_HOST }}"
          fi

          SSH_PORT_VALUE="${{ vars.HOSTINGER_SSH_PORT }}"
          if [ -z "$SSH_PORT_VALUE" ]; then
            SSH_PORT_VALUE="${{ vars.SSH_PORT }}"
          fi
          if [ -z "$SSH_PORT_VALUE" ]; then
            SSH_PORT_VALUE="${{ secrets.HOSTINGER_SSH_PORT }}"
          fi
          if [ -z "$SSH_PORT_VALUE" ]; then
            SSH_PORT_VALUE="${{ secrets.SSH_PORT }}"
          fi

          SSH_USER_VALUE="${{ vars.HOSTINGER_SSH_USER }}"
          if [ -z "$SSH_USER_VALUE" ]; then
            SSH_USER_VALUE="${{ vars.SSH_USER }}"
          fi
          if [ -z "$SSH_USER_VALUE" ]; then
            SSH_USER_VALUE="${{ secrets.HOSTINGER_SSH_USER }}"
          fi
          if [ -z "$SSH_USER_VALUE" ]; then
            SSH_USER_VALUE="${{ secrets.SSH_USER }}"
          fi

          SSH_PRIVATE_KEY_VALUE="${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}"
          if [ -z "$SSH_PRIVATE_KEY_VALUE" ]; then
            SSH_PRIVATE_KEY_VALUE="${{ secrets.SSH_PRIVATE_KEY }}"
          fi

          echo "SSH_HOST=$SSH_HOST_VALUE" >> "$GITHUB_ENV"
          echo "SSH_PORT=$SSH_PORT_VALUE" >> "$GITHUB_ENV"
          echo "SSH_USER=$SSH_USER_VALUE" >> "$GITHUB_ENV"
          echo "SSH_PRIVATE_KEY<<__COREXTOR_KEY__" >> "$GITHUB_ENV"
          printf '%s\n' "$SSH_PRIVATE_KEY_VALUE" >> "$GITHUB_ENV"
          echo "__COREXTOR_KEY__" >> "$GITHUB_ENV"
          echo "DEPLOY_BASE=$HOSTINGER_DEPLOY_BASE" >> "$GITHUB_ENV"
          echo "PRIMARY_DOCROOT=$HOSTINGER_PRIMARY_DOCROOT" >> "$GITHUB_ENV"
          echo "EMPLOYEE_SUBDIR_NAME=$HOSTINGER_EMPLOYEE_SUBDIR_NAME" >> "$GITHUB_ENV"
          echo "API_SUBDIR_NAME=$HOSTINGER_API_SUBDIR_NAME" >> "$GITHUB_ENV"

      - name: Validate deploy configuration
        run: |
          required_vars=(SSH_HOST SSH_PORT SSH_USER DEPLOY_BASE PRIMARY_DOCROOT EMPLOYEE_SUBDIR_NAME API_SUBDIR_NAME)
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required variable: $var_name" >&2
              exit 1
            fi
          done

          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "Missing required secret: HOSTINGER_SSH_PRIVATE_KEY or SSH_PRIVATE_KEY" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ${{ runner.temp }}/artifacts

      - name: Package source archive
        run: |
          chmod +x ops/cicd/create-source-archive.sh
          ops/cicd/create-source-archive.sh "$RUNNER_TEMP/corextor-source.tar.gz" "$GITHUB_WORKSPACE"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Capture current live release
        run: |
          PREVIOUS_RELEASE_ID="$(
            ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
              "if [ -L '$DEPLOY_BASE/current' ]; then current_target=\$(readlink '$DEPLOY_BASE/current'); basename \"\$current_target\"; fi"
          )"
          echo "PREVIOUS_RELEASE_ID=$PREVIOUS_RELEASE_ID" >> "$GITHUB_ENV"
          echo "Current live release: ${PREVIOUS_RELEASE_ID:-none}"

      - name: Generate release id
        run: echo "RELEASE_ID=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      - name: Upload deploy assets
        run: |
          scp -o StrictHostKeyChecking=no -P "$SSH_PORT" "$RUNNER_TEMP/artifacts/web-dist.tar.gz" "$SSH_USER@$SSH_HOST:$DEPLOY_BASE/artifacts/web-dist-$RELEASE_ID.tar.gz"
          scp -o StrictHostKeyChecking=no -P "$SSH_PORT" "$RUNNER_TEMP/corextor-source.tar.gz" "$SSH_USER@$SSH_HOST:$DEPLOY_BASE/artifacts/source-$RELEASE_ID.tar.gz"
          scp -o StrictHostKeyChecking=no -P "$SSH_PORT" ops/hostinger/remote-deploy.sh "$SSH_USER@$SSH_HOST:/tmp/corextor-remote-deploy.sh"

      - name: Execute remote deploy
        run: |
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "\
            DEPLOY_BASE='$DEPLOY_BASE' \
            RELEASE_ID='$RELEASE_ID' \
            SOURCE_ARCHIVE='$DEPLOY_BASE/artifacts/source-$RELEASE_ID.tar.gz' \
            WEB_ARTIFACT='$DEPLOY_BASE/artifacts/web-dist-$RELEASE_ID.tar.gz' \
            API_ENV_PATH='$DEPLOY_BASE/shared/api/.env' \
            PRIMARY_DOCROOT='$PRIMARY_DOCROOT' \
            EMPLOYEE_SUBDIR_NAME='${EMPLOYEE_SUBDIR_NAME:-app.corextor.com}' \
            API_SUBDIR_NAME='${API_SUBDIR_NAME:-api.corextor.com}' \
            SWITCH_DOCROOTS='$SWITCH_LIVE' \
            RUN_MIGRATIONS='$RUN_MIGRATIONS' \
            bash /tmp/corextor-remote-deploy.sh"

      - name: Post-deploy smoke test
        if: env.SWITCH_LIVE == '1'
        env:
          HEALTH_URL: ${{ vars.VITE_API_URL }}/platform/v1/health
          MAIN_URL: ${{ vars.VITE_MAIN_APP_ORIGIN }}
          EMPLOYEE_URL: ${{ vars.VITE_EMPLOYEE_APP_ORIGIN }}/pin
        run: |
          echo "Smoke check API: $HEALTH_URL"
          HEALTH_JSON="$(curl -fsSL "$HEALTH_URL")"
          printf '%s' "$HEALTH_JSON" | ruby -rjson -e 'j=JSON.parse(STDIN.read); ok=(j["status"]=="success" && j.dig("data","status")=="healthy"); exit(ok ? 0 : 1)'

          echo "Smoke check main app: $MAIN_URL"
          curl -fsSIL "$MAIN_URL" >/tmp/corextor-main.headers
          tail -n 5 /tmp/corextor-main.headers

          echo "Smoke check employee app: $EMPLOYEE_URL"
          curl -fsSIL "$EMPLOYEE_URL" >/tmp/corextor-employee.headers
          tail -n 5 /tmp/corextor-employee.headers

      - name: Auto rollback on smoke failure
        if: failure() && env.SWITCH_LIVE == '1' && env.PREVIOUS_RELEASE_ID != ''
        run: |
          scp -o StrictHostKeyChecking=no -P "$SSH_PORT" ops/hostinger/rollback-release.sh "$SSH_USER@$SSH_HOST:/tmp/corextor-rollback-release.sh"
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "\
            DEPLOY_BASE='$DEPLOY_BASE' \
            PRIMARY_DOCROOT='$PRIMARY_DOCROOT' \
            TARGET_RELEASE_ID='$PREVIOUS_RELEASE_ID' \
            bash /tmp/corextor-rollback-release.sh"

      - name: Smoke test after rollback
        if: failure() && env.SWITCH_LIVE == '1' && env.PREVIOUS_RELEASE_ID != ''
        env:
          HEALTH_URL: ${{ vars.VITE_API_URL }}/platform/v1/health
          MAIN_URL: ${{ vars.VITE_MAIN_APP_ORIGIN }}
          EMPLOYEE_URL: ${{ vars.VITE_EMPLOYEE_APP_ORIGIN }}/pin
        run: |
          curl -fsSL "$HEALTH_URL" | ruby -rjson -e 'j=JSON.parse(STDIN.read); ok=(j["status"]=="success" && j.dig("data","status")=="healthy"); exit(ok ? 0 : 1)'
          curl -fsSIL "$MAIN_URL" >/dev/null
          curl -fsSIL "$EMPLOYEE_URL" >/dev/null
