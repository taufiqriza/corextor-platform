name: Deploy Hostinger Production

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy manually
        required: true
        default: production
      switch_live:
        description: Repoint docroots to the new release
        required: true
        type: boolean
        default: false
      run_migrations:
        description: Run Laravel migrations during deploy
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-web:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_MAIN_APP_ORIGIN: ${{ vars.VITE_MAIN_APP_ORIGIN }}
      VITE_EMPLOYEE_APP_ORIGIN: ${{ vars.VITE_EMPLOYEE_APP_ORIGIN }}
    steps:
      - name: Resolve deploy ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DEPLOY_REF=${{ inputs.ref }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_REF=${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Pack frontend artifact
        run: tar -czf "$RUNNER_TEMP/web-dist.tar.gz" -C dist .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: ${{ runner.temp }}/web-dist.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build-web
    env:
      SSH_HOST: ${{ vars.HOSTINGER_SSH_HOST }}
      SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT }}
      SSH_USER: ${{ vars.HOSTINGER_SSH_USER }}
      DEPLOY_BASE: ${{ vars.HOSTINGER_DEPLOY_BASE }}
      PRIMARY_DOCROOT: ${{ vars.HOSTINGER_PRIMARY_DOCROOT }}
      EMPLOYEE_SUBDIR_NAME: ${{ vars.HOSTINGER_EMPLOYEE_SUBDIR_NAME }}
      API_SUBDIR_NAME: ${{ vars.HOSTINGER_API_SUBDIR_NAME }}
    steps:
      - name: Resolve deploy settings
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DEPLOY_REF=${{ inputs.ref }}" >> "$GITHUB_ENV"
            echo "SWITCH_LIVE=${{ inputs.switch_live && '1' || '0' }}" >> "$GITHUB_ENV"
            echo "RUN_MIGRATIONS=${{ inputs.run_migrations && '1' || '0' }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_REF=${{ github.sha }}" >> "$GITHUB_ENV"
            echo "SWITCH_LIVE=1" >> "$GITHUB_ENV"
            echo "RUN_MIGRATIONS=1" >> "$GITHUB_ENV"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ${{ runner.temp }}/artifacts

      - name: Package source archive
        run: |
          chmod +x ops/cicd/create-source-archive.sh
          ops/cicd/create-source-archive.sh "$RUNNER_TEMP/corextor-source.tar.gz" "$GITHUB_WORKSPACE"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Generate release id
        run: echo "RELEASE_ID=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      - name: Upload deploy assets
        run: |
          scp -P "$SSH_PORT" "$RUNNER_TEMP/artifacts/web-dist.tar.gz" "$SSH_USER@$SSH_HOST:$DEPLOY_BASE/artifacts/web-dist-$RELEASE_ID.tar.gz"
          scp -P "$SSH_PORT" "$RUNNER_TEMP/corextor-source.tar.gz" "$SSH_USER@$SSH_HOST:$DEPLOY_BASE/artifacts/source-$RELEASE_ID.tar.gz"
          scp -P "$SSH_PORT" ops/hostinger/remote-deploy.sh "$SSH_USER@$SSH_HOST:/tmp/corextor-remote-deploy.sh"

      - name: Execute remote deploy
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "\
            chmod +x /tmp/corextor-remote-deploy.sh && \
            DEPLOY_BASE='$DEPLOY_BASE' \
            RELEASE_ID='$RELEASE_ID' \
            SOURCE_ARCHIVE='$DEPLOY_BASE/artifacts/source-$RELEASE_ID.tar.gz' \
            WEB_ARTIFACT='$DEPLOY_BASE/artifacts/web-dist-$RELEASE_ID.tar.gz' \
            API_ENV_PATH='$DEPLOY_BASE/shared/api/.env' \
            PRIMARY_DOCROOT='$PRIMARY_DOCROOT' \
            EMPLOYEE_SUBDIR_NAME='${EMPLOYEE_SUBDIR_NAME:-app.corextor.com}' \
            API_SUBDIR_NAME='${API_SUBDIR_NAME:-api.corextor.com}' \
            SWITCH_DOCROOTS='$SWITCH_LIVE' \
            RUN_MIGRATIONS='$RUN_MIGRATIONS' \
            /tmp/corextor-remote-deploy.sh"
